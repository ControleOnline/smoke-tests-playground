services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    ControleOnline\SmokeTestsPlayground\:
        resource: '../src/'
        exclude: '../src/{DependencyInjection,Resources,SmokeTestsPlaygroundBundle.php}'

    ControleOnline\SmokeTestsPlayground\Service\SmokeBrowserInstallerInterface: '@ControleOnline\SmokeTestsPlayground\Service\SmokeBrowserInstaller'

    ControleOnline\SmokeTestsPlayground\Service\SmokeTestsSettings:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Symfony\Contracts\HttpClient\HttpClientInterface:
        class: Symfony\Contracts\HttpClient\HttpClientInterface
        factory: ['Symfony\Component\HttpClient\HttpClient', 'create']

    ControleOnline\SmokeTestsPlayground\Service\SmokeRemoteIndexReaderInterface: '@ControleOnline\SmokeTestsPlayground\Service\SmokeRemoteIndexReader'
    ControleOnline\SmokeTestsPlayground\Service\SmokeRemoteArtifactReaderInterface: '@ControleOnline\SmokeTestsPlayground\Service\SmokeRemoteArtifactReader'
